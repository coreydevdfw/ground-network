<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Labor Network</title>
  <script src='https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js'></script>
  <link href='https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css' rel='stylesheet' />
  <style>
    body { margin: 0; padding: 0; }
    #map { position: absolute; top: 0; bottom: 0; width: 100%; }
  </style>
</head>
<body>
  <div id="map"></div>
  <script>
    mapboxgl.accessToken = 'pk.eyJ1IjoiY29yZXlkZXZkZnciLCJhIjoiY21xaHF1NDgzMDAyNDJycHRtZmV5N3hobiJ9.zyCFzjjURU7lmhd7Tx49jw';

    const map = new mapboxgl.Map({
      container: 'map',
      style: 'mapbox://styles/mapbox/dark-v11',
      center: [-96.7970, 33.0137],
      zoom: 10
    });

    map.on('load', async () => {
      const response = await fetch(
        'https://data.usajobs.gov/api/search?LocationName=Dallas,Texas&ResultsPerPage=25',
        {
          headers: {
            'Authorization-Key': 'OqqpmePnZJbPca30g9gSSQHCDbUTS5DatiFtX3wKMc0=',
            'User-Agent': 'corey.spence.shs@gmail.com'
          }
        }
      );

      const data = await response.json();
      const jobs = data.SearchResult.SearchResultItems;

      jobs.forEach(job => {
        const title = job.MatchedObjectDescriptor.PositionTitle;
        const org = job.MatchedObjectDescriptor.OrganizationName;
        const url = job.MatchedObjectDescriptor.ApplyURI[0];
        const lat = parseFloat(job.MatchedObjectDescriptor.PositionLocationDisplay) || 33.0137;
        const lng = -96.7970;

        new mapboxgl.Marker({ color: '#00ff88' })
          .setLngLat([lng, lat])
          .setPopup(new mapboxgl.Popup().setHTML(
            `<strong>${title}</strong><br>${org}<br><a href="${url}" target="_blank">Apply</a>`
          ))
          .addTo(map);
      });
    });
  </script>
</body>
</html>
